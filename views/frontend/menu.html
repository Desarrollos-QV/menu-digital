<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital</title><!-- ID para el Favicon Dinámico -->
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Swiper JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <!-- Toastr & jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="./assets/css/front.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300">
<div id="app" class="flex flex-col min-h-screen pb-20">

    <!-- PANTALLA ERROR / NO BUSINESS -->
    <div v-if="businessError" class="fixed inset-0 bg-slate-50 dark:bg-slate-950 z-50 flex flex-col items-center justify-center p-8 text-center">
        <div class="w-24 h-24 bg-slate-200 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6 text-4xl text-slate-400">
            <i class="fa-solid fa-store-slash"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Negocio no encontrado</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-6">Parece que el enlace es incorrecto o el negocio no está disponible.</p>
        <p class="text-xs text-slate-400">Prueba con ?slug=nombre-del-negocio</p>
    </div>

    <template v-else>
        <!-- HEADER -->
        <header class="sticky top-0 z-30 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md shadow-sm px-4 pt-4 pb-3 transition-all duration-300 border-b border-transparent dark:border-slate-800" 
                :class="{'shadow-md dark:shadow-slate-900/50': scrollY > 10}">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-3">
                    <!-- Avatar del Negocio -->
                    <div v-if="config.avatar" class="w-10 h-10 rounded-full overflow-hidden border border-slate-100 dark:border-slate-700 shadow-sm">
                        <img :src="config.avatar" class="w-full h-full object-cover">
                    </div>
                    <div v-else class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold shadow-sm shadow-primary/30">
                        {{ (config.appName || 'M')[0] }}
                    </div>
                    
                    <div class="cursor-pointer group select-none" @click="showBusinessModal = true">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h1 class="text-lg font-bold text-slate-800 dark:text-white leading-none group-hover:text-primary transition-colors">{{ config.appName || 'Cargando...' }} <i class="fa-solid fa-chevron-right text-xs text-slate-400 group-hover:translate-x-1 transition-transform"></i></h1>
                            <!-- Rating -->
                            <span v-if="!isLoading" class="flex items-center gap-1 text-xs font-bold text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full"><i class="fa-solid fa-star text-yellow-400"></i> {{ config.calculatedRating }} <span class="text-[10px] text-slate-400 font-normal">({{config.reviewsCount}})</span></span>
                            <!-- Badge Estado -->
                            <span v-if="!isLoading"
                                class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide transition-all"
                                :class="isBusinessOpen ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300' : 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400'">
                                <span class="w-1.5 h-1.5 rounded-full animate-pulse" :class="isBusinessOpen ? 'bg-emerald-500' : 'bg-red-500'"></span>
                                {{ isBusinessOpen ? 'Abierto' : 'Cerrado' }}
                            </span>
                        </div>
                        <!-- Horario del día / Info -->
                        <p v-if="todaySchedule && !isLoading" class="text-[11px] text-slate-500 dark:text-slate-400 font-medium mt-1 flex items-center gap-1">
                            <i class="fa-regular fa-clock text-[9px]"></i>
                            <span v-if="todaySchedule.isOpen">{{ todaySchedule.open }} - {{ todaySchedule.close }}</span>
                            <span v-else>Cerrado hoy</span>
                            <span class="mx-1">&bull;</span>
                            <i class="fa-solid fa-motorcycle text-[9px]"></i> {{ config.time || '30-45' }} min
                        </p>
                        <p v-else-if="!isLoading" class="text-[11px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wide">Menú Digital</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button @click="toggleTheme" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 flex items-center justify-center transition-colors">
                        <i class="fa-solid" :class="isDark ? 'fa-sun' : 'fa-moon'"></i>
                    </button>
                </div>
                </div>
                <div class="relative w-full" v-if="!showCartModal">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-slate-400"></i>
                    <input v-model="searchQuery" type="text" placeholder="¿Qué se te antoja hoy?" 
                           class="w-full bg-slate-100 dark:bg-slate-800 dark:text-white rounded-xl py-3 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition shadow-inner dark:placeholder-slate-500">
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-x-hidden">
            <div class="max-w-7xl mx-auto w-full">
            
            <!-- LOADING SKELETON -->
            <div v-if="isLoading" class="mt-4 px-4 space-y-6">
                <div class="w-full h-40 md:h-64 rounded-2xl skeleton"></div>
                <div class="flex space-x-3 overflow-hidden"><div v-for="i in 6" :key="i" class="flex flex-col items-center gap-2"><div class="w-14 h-14 rounded-2xl skeleton"></div></div></div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"><div v-for="i in 6" :key="i" class="w-full h-28 rounded-2xl skeleton"></div></div>
            </div>

            <!-- REAL CONTENT -->
            <div v-else class="animate-fade-in">
                <template v-if="!showCartModal"> 
                    <!-- BANNERS -->
                    <div v-if="banners.length > 0" class="mt-4 px-4">
                        <div class="swiper banner-swiper !pb-8 rounded-2xl overflow-hidden">
                            <div class="swiper-wrapper">
                                <div v-for="banner in banners" :key="banner._id" class="swiper-slide">
                                    <div class="relative h-40 md:h-64 lg:h-80 w-full rounded-2xl overflow-hidden shadow-md group dark:shadow-none dark:border dark:border-slate-700">
                                        <img :src="banner.imageUrl" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                                            <h3 class="text-white font-bold text-lg leading-tight drop-shadow-md">{{ banner.title }}</h3>
                                            <p v-if="banner.description" class="text-white/90 text-xs mt-1 line-clamp-1 drop-shadow-md">{{ banner.description }}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="swiper-pagination !bottom-0"></div>
                        </div>
                    </div>

                    <!-- CATEGORIES -->
                    <div class="sticky top-[95px] md:top-[98px] lg:top-[102px] z-20 bg-white/95 dark:bg-slate-900/95 backdrop-blur py-4 px-6 rounded-2xl border-b border-slate-100 dark:border-slate-800 mb-4 transition-colors duration-300">
                        <div class="flex space-x-3 overflow-x-auto hide-scroll pb-1">
                            <button @click="selectedCategory = 'all'" class="flex flex-col items-center min-w-[70px] transition-all duration-200 group" :class="selectedCategory === 'all' ? 'opacity-100 scale-105' : 'opacity-60 hover:opacity-100'">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-1 shadow-sm transition-colors duration-300" :class="selectedCategory === 'all' ? 'bg-primary text-white shadow-primary/30' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400'"><i class="fa-solid fa-utensils text-xl"></i></div>
                                <span class="text-xs font-medium truncate w-full text-center" :class="selectedCategory === 'all' ? 'text-primary font-bold' : 'text-slate-500 dark:text-slate-400'">Todo</span>
                            </button>
                            <button v-for="cat in categories" :key="cat._id" @click="selectedCategory = cat._id" class="flex flex-col items-center min-w-[70px] transition-all duration-200 group" :class="selectedCategory === cat._id ? 'opacity-100 scale-105' : 'opacity-60 hover:opacity-100'">
                                <div class="w-14 h-14 rounded-2xl overflow-hidden mb-1 shadow-sm border-2 transition-colors duration-300 bg-slate-100 dark:bg-slate-800" :class="selectedCategory === cat._id ? 'border-primary' : 'border-transparent dark:border-slate-700'">
                                    <img v-if="cat.image" :src="cat.image" class="w-full h-full object-cover">
                                    <div v-else class="w-full h-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-bowl-food"></i></div>
                                </div>
                                <span class="text-xs font-medium truncate w-full text-center" :class="selectedCategory === cat._id ? 'text-primary font-bold' : 'text-slate-500 dark:text-slate-400'">{{ cat.name }}</span>
                            </button>
                        </div>
                    </div>

                    <!-- PRODUCTS GRID -->
                    <div class="px-4 pb-24">
                        <div class="flex justify-between items-end mb-4">
                            <h2 class="text-lg font-bold text-slate-800 dark:text-white">{{ selectedCategoryName }} <span class="text-xs font-normal text-slate-400 ml-1">({{ filteredProducts.length }})</span></h2>
                            <span v-if="searchQuery" class="text-xs text-primary cursor-pointer" @click="searchQuery = ''">Borrar filtro</span>
                        </div>

                        <div v-if="filteredProducts.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                            <div v-for="prod in filteredProducts" :key="prod._id" class="bg-white dark:bg-slate-900 rounded-2xl p-3 md:p-4 shadow-sm border border-slate-100 dark:border-slate-800 flex gap-4 hover:shadow-md transition-shadow cursor-pointer" @click="initAddToCart(prod)">
                                <div class="w-28 h-28 md:w-32 md:h-32 shrink-0 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 relative">
                                    <img :src="prod.image || 'https://via.placeholder.com/150'" class="w-full h-full object-cover">
                                    <span v-if="prod.salesCount > 10" class="absolute top-1 left-1 bg-yellow-400 text-[10px] font-bold px-1.5 py-0.5 rounded text-black shadow-sm">TOP</span>
                                </div>
                                
                                <div class="flex-1 flex flex-col justify-between py-1">
                                    <div>
                                        <h3 class="font-bold text-slate-800 dark:text-slate-100 leading-snug line-clamp-2 md:text-lg group-hover:text-primary transition-colors">{{ prod.name }}</h3>
                                        <p class="text-xs md:text-sm text-slate-500 dark:text-slate-400 mt-1 line-clamp-2">{{ prod.description }}</p>
                                    </div>
                                    
                                    <div class="flex justify-between items-center mt-2 md:mt-3">
                                        <span class="text-lg md:text-xl font-bold text-slate-900 dark:text-white">${{ prod.price }}</span>
                                        <button @click.stop="initAddToCart(prod)" class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-slate-100 dark:bg-slate-800 text-primary hover:bg-primary hover:text-white transition flex items-center justify-center shadow-sm">
                                            <i class="fa-solid fa-plus md:text-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div v-else class="text-center py-10">
                            <div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-300 dark:text-slate-600"><i class="fa-solid fa-utensils text-3xl"></i></div>
                            <p class="text-slate-500 dark:text-slate-400 font-medium">No encontramos productos.</p>
                        </div>
                    </div>
                </template>
                <!-- Modal de Carrito -->
                <template v-else>
                    <div class="bg-white dark:bg-slate-900 w-full max-w-3xl mx-auto sm:border sm:border-slate-200 dark:sm:border-slate-800 md:rounded-2xl shadow-none sm:shadow-2xl relative z-10 md:my-8 flex flex-col animate-slide-up">
                        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                            <button @click="showCartModal = false" class="text-slate-400 hover:text-red-500">
                                <i class="fa-solid fa-backspace text-xl"></i>
                            </button>
                            <h2 class="text-xl font-bold text-slate-800 dark:text-white">Tu Pedido</h2>
                        </div>

                        <div class="flex-1 overflow-y-auto p-6 space-y-6">
                            <div v-if="cart.length === 0" class="text-center py-16 text-slate-400">
                                <i class="fa-solid fa-basket-shopping text-6xl mb-4 opacity-50"></i>
                                <p class="text-lg">Tu carrito está vacío.</p>
                            </div>
                            
                            <div v-for="(item, idx) in cart" :key="idx" class="flex gap-4 items-center sm:items-start bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                                <div class="w-20 h-20 md:w-24 md:h-24 rounded-lg bg-slate-100 dark:bg-slate-800 shrink-0 overflow-hidden">
                                    <img :src="item.product.image || 'https://via.placeholder.com/150'" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-start mb-1">
                                        <h4 class="font-bold text-slate-800 dark:text-white text-sm line-clamp-1 md:text-base">{{ item.product.name }}</h4>
                                        <span class="font-bold text-slate-900 dark:text-white text-sm md:text-base">${{ item.unitPrice * item.quantity }}</span>
                                    </div>
                                    <div v-if="item.selectedOptions && item.selectedOptions.length > 0" class="mb-2">
                                        <p v-for="opt in item.selectedOptions" :key="opt.name" class="text-xs text-slate-500 dark:text-slate-400 flex justify-between">
                                            <span>+ {{ opt.name }}</span>
                                            <span v-if="opt.priceExtra > 0">${{ opt.priceExtra }}</span>
                                        </p>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-400">${{ item.unitPrice }} c/u</span>
                                        <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1 h-7">
                                            <button @click="decreaseCartItem(idx)" class="w-6 h-full flex items-center justify-center text-slate-500 hover:text-primary"><i class="fa-solid fa-minus text-[10px]"></i></button>
                                            <span class="mx-2 text-xs font-bold text-slate-800 dark:text-white">{{ item.quantity }}</span>
                                            <button @click="item.quantity++" class="w-6 h-full flex items-center justify-center text-slate-500 hover:text-primary"><i class="fa-solid fa-plus text-[10px]"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 bg-slate-50 dark:bg-slate-950 border-t border-slate-100 dark:border-slate-800 sm:rounded-b-2xl">
                            <!-- Toggle Delivery/Pickup -->
                            <div class="flex bg-slate-200 dark:bg-slate-800 p-1 rounded-xl mb-6">
                                <button @click="deliveryType = 'delivery'" 
                                        class="flex-1 py-2 text-sm font-bold rounded-lg transition-all flex items-center justify-center"
                                        :class="deliveryType === 'delivery' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-800 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'">
                                    <i class="fa-solid fa-motorcycle mr-2"></i> A Domicilio
                                </button>
                                <button @click="deliveryType = 'pickup'" 
                                        class="flex-1 py-2 text-sm font-bold rounded-lg transition-all flex items-center justify-center"
                                        :class="deliveryType === 'pickup' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-800 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'">
                                    <i class="fa-solid fa-store mr-2"></i> Recoger en tienda
                                </button>
                            </div>

                            <div class="mb-4">
                                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Nombre</label>
                                <input v-model="customerName" type="text" placeholder="Ej: Juan Pérez" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                            </div>
                            <div class="mb-4">
                                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Telefono</label>
                                <input v-model="customerPhone" type="tel" placeholder="Ej: 1234567890" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                            </div>
                            
                            <template v-if="deliveryType === 'delivery'">
                                <div class="grid grid-cols-2 gap-4 mb-4 ">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Calle</label>
                                        <input v-model="customerStreet" type="text" placeholder="Ej: Calle zorgo" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Numero</label>
                                        <input v-model="customerNumber" type="text" placeholder="Ej: #417" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Colonia</label>
                                        <input v-model="customerColony" type="text" placeholder="Ej: Colonia privada" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Codigo Postal</label>
                                        <input v-model="customerZipCode" type="text" placeholder="Ej: 64000" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Tu Referencia</label>
                                        <input v-model="customerReference" type="text" placeholder="Ej: Referencia externa u observaciones" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                    </div>

                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Método de pago</label>
                                        <select v-model="paymentMethod" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                            <option value="cash">Efectivo</option>
                                            <option value="card">Tarjeta</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div v-if="paymentMethod === 'cash'" class="mb-4 animate-fade-in">
                                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">¿Con cuanto paga?</label>
                                    <input v-model="customerHowToPay" type="number" placeholder="Ej: 500" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm" required>
                                </div>
                            </template>
                            
                            <!-- Método de Pago para Recoger en tienda (Solo el select y pago) -->
                            <template v-else>
                                <div class="mb-4">
                                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Método de pago</label>
                                    <select v-model="paymentMethod" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm">
                                        <option value="cash">Efectivo</option>
                                        <option value="card">Tarjeta</option>
                                    </select>
                                </div>

                                <div v-if="paymentMethod === 'cash'" class="mb-4 animate-fade-in">
                                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">¿Con cuanto paga?</label>
                                    <input v-model="customerHowToPay" type="number" placeholder="Ej: 500" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:border-primary text-sm" required>
                                </div>
                            </template>
                            
                            <div class="space-y-2 mb-4">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-500 dark:text-slate-400 font-medium">SubTotal</span>
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">${{ cartSubTotal?.toFixed(2) }}</span>
                                </div>
                                <div v-if="commissionWebAmountCmp > 0" class="flex justify-between items-center text-orange-500">
                                    <span class="text-sm font-medium">Comisión de plataforma ({{ config.commissionWebType === 'percent' ? config.commissionWebAmount + '%' : '$' + config.commissionWebAmount }})</span>
                                    <span class="text-sm font-bold">+${{ commissionWebAmountCmp?.toFixed(2) }}</span>
                                </div>
                                <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800">
                                    <span class="text-slate-500 dark:text-slate-400 font-bold">Total a pagar</span>
                                    <span class="text-2xl font-black text-slate-900 dark:text-white">${{ cartTotalPrice?.toFixed(2) }}</span>
                                </div>
                            </div>
                            <button v-if="isBusinessOpen" @click="checkout" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-500/30 flex items-center justify-center gap-2 transition active:scale-95" :disabled="cart.length === 0">
                                <i class="fa-brands fa-whatsapp text-xl"></i>
                                <span>Enviar Pedido a WhatsApp</span>
                            </button>
                            <button v-else @click="alertBussinesClose()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-gray-500/30 flex items-center justify-center gap-2 transition active:scale-95" :disabled="cart.length === 0">
                                <i class="fa-brands fa-whatsapp text-xl"></i>
                                <span>Enviar Pedido a WhatsApp</span>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
            </div>
        </main>

        <!-- FLOATING CART BUTTON -->
        <div v-if="cart.length > 0 && !showCartModal" class="fixed bottom-6 left-0 right-0 px-6 z-40 flex justify-center animate-slide-up">
            <button @click="showCartModal = true" class="bg-slate-900 dark:bg-primary text-white w-full max-w-md shadow-2xl shadow-slate-900/30 dark:shadow-primary/40 rounded-2xl py-4 px-6 flex justify-between items-center transform transition active:scale-95">
                <div class="flex items-center space-x-3">
                    <span class="bg-primary dark:bg-white dark:text-primary text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">{{ cartTotalItems }}</span>
                    <span class="font-medium">Ver mi pedido</span>
                </div>
                <span class="font-bold text-lg">${{ cartTotalPrice?.toFixed(2) }}</span>
            </button>
        </div>

        <!-- BOTÓN LEALTAD (Regalo Flotante) -->
        <button @click="openLoyaltyModal && !showCartModal" class="fixed bottom-24 right-6 z-40 w-14 h-14 bg-white dark:bg-slate-800 rounded-full shadow-xl flex items-center justify-center text-2xl border-2 border-yellow-400 animate-pulse-fast hover:scale-110 transition">
            🎁
        </button>

        <!-- PRODUCT DETAILS MODAL -->
        <div v-if="showProductModal" class="fixed inset-0 z-50 flex flex-col justify-end sm:justify-center items-center p-0 sm:p-4">
            <div @click="showProductModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>
            
            <div class="bg-white dark:bg-slate-900 w-full max-w-2xl sm:rounded-3xl rounded-t-3xl shadow-2xl relative z-10 max-h-[90vh] flex flex-col animate-slide-up">
                <!-- Header Image -->
                <div class="h-48 md:h-64 w-full bg-slate-100 dark:bg-slate-800 relative sm:rounded-t-3xl rounded-t-3xl overflow-hidden shrink-0">
                    <img :src="activeProduct.image || 'https://via.placeholder.com/400x200'" class="w-full h-full object-cover">
                    <button @click="showProductModal = false" class="absolute top-4 right-4 bg-white/90 dark:bg-black/50 p-2 rounded-full shadow-sm text-slate-800 dark:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="flex-1 overflow-y-auto p-6">
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-slate-800 dark:text-white leading-tight">{{ activeProduct.name }}</h2>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">{{ activeProduct.description }}</p>
                        <p class="text-xl font-bold text-primary mt-3">${{ activeProduct.price }}</p>
                    </div>

                    <!-- Addons List -->
                    <div v-if="activeProductAddons.length > 0" class="space-y-6">
                        <div v-for="addonGroup in activeProductAddons" :key="addonGroup._id" class="border-t border-slate-100 dark:border-slate-800 pt-4">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-slate-700 dark:text-slate-200">{{ addonGroup.name }}</h3>
                                <span v-if="addonGroup.required" class="text-[10px] bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-2 py-0.5 rounded font-bold uppercase">Obligatorio</span>
                                <span v-else class="text-[10px] bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded font-bold uppercase">Opcional</span>
                            </div>
                            <div class="space-y-2">
                                <div v-for="option in addonGroup.options" :key="option._id" 
                                     class="flex items-center justify-between p-3 rounded-xl border transition-all cursor-pointer"
                                     :class="isOptionSelected(addonGroup, option) ? 'border-primary bg-primary/5 dark:bg-primary/10' : 'border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900'"
                                     @click="toggleOption(addonGroup, option)">
                                    <div class="flex items-center gap-3">
                                        <div class="w-5 h-5 rounded border flex items-center justify-center transition-colors"
                                             :class="[ isOptionSelected(addonGroup, option) ? 'bg-primary border-primary' : 'border-slate-300 dark:border-slate-600', addonGroup.maxOptions === 1 ? 'rounded-full' : 'rounded-md' ]">
                                            <i v-if="isOptionSelected(addonGroup, option)" class="fa-solid fa-check text-white text-xs"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ option.name }}</span>
                                    </div>
                                    <span v-if="option.priceExtra > 0" class="text-xs font-bold text-slate-500 dark:text-slate-400">+${{ option.priceExtra }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-slate-50 dark:bg-slate-950 border-t border-slate-100 dark:border-slate-800 sm:rounded-b-2xl">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 h-12 px-2 shrink-0">
                            <button @click="modalQuantity > 1 ? modalQuantity-- : null" class="w-8 h-full text-slate-500 hover:text-primary"><i class="fa-solid fa-minus"></i></button>
                            <span class="w-8 text-center font-bold text-slate-800 dark:text-white">{{ modalQuantity }}</span>
                            <button @click="modalQuantity++" class="w-8 h-full text-slate-500 hover:text-primary"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <button @click="confirmAddToCart" class="flex-1 bg-primary hover:bg-indigo-600 text-white font-bold h-12 rounded-xl shadow-lg shadow-indigo-500/30 flex justify-between items-center px-6 transition active:scale-95">
                            <span>Agregar</span>
                            <span>${{ modalTotalPrice }}</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CART MODAL 
        <div v-if="showCartModal" class="fixed inset-0 z-50 flex flex-col justify-end sm:justify-center items-center">
            <div @click="showCartModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>    
        </div>
        -->
        <!-- MODAL LEALTAD -->
        <div v-if="showLoyaltyModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
            <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl overflow-hidden relative">
                <button @click="showLoyaltyModal = false" class="absolute top-4 right-4 text-slate-400 hover:text-white z-10"><i class="fa-solid fa-xmark text-xl"></i></button>
                
                <!-- Banner Color -->
                <div class="h-32 w-full bg-primary flex items-center justify-center relative">
                    <div class="absolute -bottom-8 w-20 h-20 rounded-full bg-white dark:bg-slate-900 flex items-center justify-center border-4 border-primary">
                        <i class="fa-solid fa-crown text-3xl text-yellow-400"></i>
                    </div>
                </div>

                <div class="pt-12 pb-8 px-6 text-center">
                    
                    <!-- CASO 1: REGISTRO (Si no existe) -->
                    <div v-if="!loyaltyState.registered">
                        <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2">¡Únete al Club!</h3>
                        <p class="text-sm text-slate-500 mb-4">Regístrate para acumular puntos.</p>
                        
                        <div class="space-y-3">
                            <input v-model="loyaltyForm.name" type="text" placeholder="Tu Nombre" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-center outline-none focus:border-primary">
                            <input v-model="loyaltyForm.phone" type="tel" placeholder="Teléfono (Será tu ID)" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-center outline-none focus:border-primary">
                            <!-- Campo PIN -->
                            <input v-model="loyaltyForm.pin" type="password" maxlength="4" placeholder="Crea un PIN (4 dígitos)" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-center outline-none focus:border-primary tracking-widest">
                            
                            <button @click="registerLoyalty" class="w-full bg-primary text-white font-bold py-3 rounded-xl shadow-lg shadow-primary/30">Crear Tarjeta</button>
                            
                            <!-- Botón Recuperar -->
                            <p class="text-xs text-slate-400 mt-2 cursor-pointer hover:text-primary" @click="toggleRecoverMode">¿Ya tienes cuenta? Inicia sesión</p>
                        </div>
                    </div>

                    <!-- CASO 2: LOGIN (Pide PIN) -->
                    <div v-else-if="loyaltyState.authRequired">
                        <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2">Bienvenido de nuevo</h3>
                        <p class="text-sm text-slate-500 mb-4">Ingresa tu PIN para ver tus puntos.</p>
                        
                        <div class="space-y-3">
                            <input v-model="loyaltyForm.phone" type="tel" readonly class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 text-center border-none">
                            <input v-model="loyaltyForm.pin" type="password" maxlength="4" placeholder="PIN de 4 dígitos" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-center outline-none focus:border-primary tracking-widest">
                            <button @click="loginLoyalty" class="w-full bg-primary text-white font-bold py-3 rounded-xl shadow-lg shadow-primary/30">Ver Tarjeta</button>
                            <p class="text-xs text-slate-400 mt-2 cursor-pointer hover:text-red-400" @click="resetLoyaltyState">No soy yo / Salir</p>
                        </div>
                    </div>

                    <!-- CASO 3: TARJETA DIGITAL (Logueado) -->
                    <div v-else>
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-1">Hola, {{ loyaltyState.customer.name }}</h3>
                        <p class="text-xs text-slate-400 uppercase tracking-widest mb-6">Membresía Digital</p>

                        <div class="bg-white p-4 rounded-xl shadow-inner inline-block mb-4 border border-slate-200">
                            <canvas id="qr-code"></canvas>
                        </div>
                        <p class="text-xs text-slate-400 mb-6">Muestra este código al pagar</p>

                        <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-3xl font-black text-primary">{{ loyaltyState.customer.points }}</span>
                                <span class="text-xs text-slate-500 mb-1">/ {{ loyaltyState.program.goal }} Puntos</span>
                            </div>
                            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5">
                                <div class="bg-yellow-400 h-2.5 rounded-full transition-all duration-1000" :style="`width: ${(loyaltyState.customer.points / loyaltyState.program.goal) * 100}%`"></div>
                            </div>
                            <p class="text-xs text-slate-500 mt-2 text-left">Premio: <span class="font-bold text-slate-700 dark:text-white">{{ loyaltyState.program.reward }}</span></p>
                        </div>
                        <button @click="logoutLoyalty" class="mt-4 text-xs text-red-400 hover:underline">Cerrar mi sesión</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- BUSINESS INFO MODAL (UBER EATS STYLE) -->
        <div v-if="showBusinessModal" class="fixed inset-0 z-50 flex justify-center items-end sm:items-center">
            <div @click="showBusinessModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>
            
            <div class="bg-slate-50 dark:bg-slate-900 w-full max-w-2xl sm:rounded-3xl rounded-t-3xl shadow-2xl relative z-10 max-h-[95vh] sm:max-h-[90vh] flex flex-col animate-slide-up overflow-hidden">
                <!-- Header con Cover -->
                <div class="relative h-32 md:h-48 bg-slate-200 dark:bg-slate-800 shrink-0">
                    <img v-if="config.avatar" :src="config.avatar" class="w-full h-full object-cover blur-sm opacity-50 dark:opacity-30">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    
                    <button @click="showBusinessModal = false" class="absolute top-4 right-4 bg-white/20 hover:bg-white/40 backdrop-blur-md p-2 rounded-full text-white transition-colors z-10">
                        <i class="fa-solid fa-xmark w-5 h-5 flex items-center justify-center"></i>
                    </button>

                    <div class="absolute bottom-4 left-6 flex items-end gap-4">
                        <div v-if="config.avatar" class="w-16 h-16 rounded-2xl overflow-hidden border-2 border-white dark:border-slate-800 shadow-lg bg-white">
                            <img :src="config.avatar" class="w-full h-full object-cover">
                        </div>
                        <div class="text-white pb-1">
                            <h2 class="text-2xl font-bold leading-tight drop-shadow-md">{{ config.appName }}</h2>
                            <p class="text-sm text-white/90 drop-shadow flex items-center gap-2">
                                <span class="flex items-center gap-1"><i class="fa-solid fa-star text-yellow-400"></i> {{ config.calculatedRating }} ({{ config.reviewsCount }})</span>
                                <span>&bull;</span>
                                <span class="flex items-center gap-1"><i class="fa-solid fa-motorcycle"></i> {{ config.time || '30-45' }} min</span>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto w-full flex flex-col hide-scroll">
                    <!-- Nav Tabs (Static for now) -->
                    <div class="bg-white dark:bg-slate-900 px-6 py-3 border-b border-slate-100 dark:border-slate-800 flex gap-6 text-sm font-bold sticky top-0 z-10">
                        <span class="text-primary border-b-2 border-primary pb-1">Información</span>
                    </div>

                    <div class="p-6 space-y-8 bg-slate-50 dark:bg-slate-900 flex-1">
                        
                        <!-- Descripción -->
                        <div v-if="config.description">
                            <h3 class="font-bold text-slate-800 dark:text-white mb-2 text-lg">Acerca de nosotros</h3>
                            <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">{{ config.description }}</p>
                        </div>

                        <!-- Mapa y Dirección -->
                        <div>
                            <h3 class="font-bold text-slate-800 dark:text-white mb-3 text-lg">Ubicación</h3>
                            <div class="bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700">
                                <div class="h-40 bg-slate-200 dark:bg-slate-700 w-full relative">
                                    <iframe v-if="config.lat && config.lng" 
                                        width="100%" height="100%" frameborder="0" style="border:0"
                                        :src="`https://maps.google.com/maps?q=${config.lat},${config.lng}&hl=es&z=15&output=embed`" allowfullscreen>
                                    </iframe>
                                    <div v-else class="w-full h-full flex flex-col items-center justify-center text-slate-400">
                                        <i class="fa-solid fa-map-location-dot text-4xl mb-2 opacity-50"></i>
                                        <span class="text-xs font-medium">Mapa no disponible</span>
                                    </div>
                                </div>
                                <div class="p-4 flex items-start gap-3">
                                    <i class="fa-solid fa-location-dot text-primary mt-1"></i>
                                    <div>
                                        <p class="text-sm font-bold text-slate-800 dark:text-white">{{ config.address || 'Dirección no especificada' }}</p>
                                        <p class="text-xs text-slate-500 mt-1" v-if="config.address">Abre tu app de mapas preferida</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Horarios -->
                        <div v-if="config.schedule && config.schedule.length > 0">
                            <h3 class="font-bold text-slate-800 dark:text-white mb-3 text-lg">Horarios de atención</h3>
                            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 divide-y divide-slate-50 dark:divide-slate-700/50">
                                <div v-for="day in config.schedule" :key="day.day" class="p-4 flex justify-between items-center text-sm">
                                    <span class="font-medium text-slate-700 dark:text-slate-200">{{ day.day }}</span>
                                    <span v-if="day.isOpen" class="text-slate-500 font-medium">{{ day.open }} - {{ day.close }}</span>
                                    <span v-else class="text-red-400 font-medium bg-red-50 dark:bg-red-900/20 px-2 py-0.5 rounded">Cerrado</span>
                                </div>
                            </div>
                        </div>

                        <!-- Reseñas -->
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-slate-800 dark:text-white text-lg">Reseñas y Comentarios</h3>
                                <span class="bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400 px-3 py-1 rounded-full font-bold text-sm flex items-center gap-1">
                                    <i class="fa-solid fa-star"></i> {{ config.calculatedRating }}
                                </span>
                            </div>

                            <!-- Listado -->
                            <div class="space-y-4 mb-6">
                                <div v-if="reviews.length === 0" class="text-center py-6 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <i class="fa-regular fa-comment-dots text-3xl text-slate-300 dark:text-slate-600 mb-2"></i>
                                    <p class="text-sm text-slate-500">Sé el primero en dejar una reseña.</p>
                                </div>
                                <div v-else-if="reviews.length > 0" v-for="rev in reviews" :key="rev._id" class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="font-bold text-slate-800 dark:text-white text-sm">{{ rev.customerName }}</span>
                                        <div class="flex text-yellow-400 text-[10px]">
                                            <i class="fa-solid fa-star" v-for="s in rev.rating" :key="s"></i>
                                            <i class="fa-regular fa-star" v-for="s in (5 - rev.rating)" :key="'e'+s"></i>
                                        </div>
                                    </div>
                                    <p class="text-sm text-slate-600 dark:text-slate-400">{{ rev.comment }}</p>
                                    <span class="text-[10px] text-slate-400 mt-2 block">{{ new Date(rev.createdAt).toLocaleDateString() }}</span>
                                </div>
                            </div>

                            <!-- Formulario de Reseña -->
                            <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                                <h4 class="font-bold text-slate-800 dark:text-white mb-3 text-sm">Deja tu reseña</h4>
                                <input v-model="newReview.customerName" type="text" placeholder="Tu Nombre" class="w-full mb-3 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 dark:text-white text-sm focus:outline-none focus:border-primary">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="text-sm text-slate-500">Calificación:</span>
                                    <div class="flex gap-1 text-2xl text-slate-300 dark:text-slate-600 cursor-pointer">
                                        <i v-for="i in 5" :key="i" class="fa-solid fa-star hover:scale-110 transition-transform" 
                                           :class="i <= newReview.rating ? 'text-yellow-400' : ''" 
                                           @click="newReview.rating = i"></i>
                                    </div>
                                </div>
                                <textarea v-model="newReview.comment" placeholder="'Excelente servicio, la comida llegó caliente...'" class="w-full mb-3 px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 dark:text-white text-sm focus:outline-none focus:border-primary resize-none h-20"></textarea>
                                <button @click="submitReview" :disabled="submittingReview" class="w-full bg-slate-900 dark:bg-primary text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition active:scale-95 disabled:opacity-50">
                                    <i v-if="submittingReview" class="fa-solid fa-circle-notch fa-spin"></i>
                                    <span v-else>Publicar Reseña</span>
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </template>
</div>

<script src="./assets/js/front/app.js"></script>
</body>
</html>
